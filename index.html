<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Data Processor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="gatau.css">

    <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body>

<div class="wrapper">

    <header>
        <div class="header-left">
            <h1>Excel Data<span>Processor</span></h1>
            <p>Import data → Analisis dengan AI → Export ke Excel</p>
        </div>
        <div class="header-right">
            <span id="exportFilenameDisplay" class="filename-badge"></span>
            <button onclick="exportToExcel()" class="btn btn-green">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Export Excel
            </button>
        </div>
    </header>

    <div class="top-grid">
        <div class="card">
            <div class="card-title">
                <span class="dot" style="background: var(--accent)"></span>
                Data Source
            </div>

            <div class="file-input-wrapper">
                <label class="file-input-label" for="excelFile">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    Upload .xlsx / .xls / .csv
                </label>
                <input type="file" id="excelFile" accept=".xlsx, .xls, .csv">
            </div>

            <div class="divider">atau</div>

            <textarea id="pasteArea" rows="3" placeholder="Paste data (tab-separated) di sini..."></textarea>
            <button onclick="processPastedData()" class="btn btn-ghost" style="margin-top: 10px;">
                Load Pasted Data
            </button>
        </div>

        <div class="ai-card">
            <div class="card-title">
                <span class="dot" style="background: var(--accent2)"></span>
                AI Data Analyst
            </div>

            <div class="ai-input-row">
                <textarea id="aiPrompt" rows="3" placeholder="Contoh: 'Rekap total penjualan per sales', 'Filter hanya bulan Januari', 'Hitung rata-rata per kategori'..."></textarea>
                <button onclick="processWithAI()" id="btnAI" class="btn btn-purple" style="height: 80px; flex-direction: column; gap: 6px; min-width: 120px;">
                    <div class="loader" id="aiLoader"></div>
                    <svg id="aiIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                    <span id="aiBtnText">Eksekusi Data</span>
                </button>
            </div>

            <div class="ai-summary" id="aiSummary">
                <strong>📝 Log:</strong> <span id="aiSummaryText"></span>
            </div>
            <div class="ai-error" id="aiError"></div>
        </div>
    </div>

    <div class="table-card">
        <div class="table-header">
            <h2>Live Data Table</h2>
            <span class="row-badge" id="rowCount">0 baris</span>
        </div>
        <div class="table-wrap">
            <table id="dataTable">
                <thead><tr id="tableHead"></tr></thead>
                <tbody id="tableBody">
                    <tr><td colspan="99"><div class="empty-state">Belum ada data. Import atau paste data di atas.</div></td></tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script>
    const GEMINI_API_KEY = "AIzaSyCWvQ-dCRQ-gXK1qT-IyJnzqMhPxayskZM"; // Masukkan API Key kamu di sini

    let currentData = [];
    let currentDynamicFilename = "Laporan_Analisis.xlsx";

    // === 1. LOAD EXCEL ===
    document.getElementById('excelFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const worksheet = workbook.Sheets[workbook.SheetNames[0]];
            currentData = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: "" });
            currentDynamicFilename = "Clean_" + file.name;
            updateFilenameDisplay();
            processUIAfterDataLoad();
        };
        reader.readAsArrayBuffer(file);
    });

    function processPastedData() {
        const rawText = document.getElementById('pasteArea').value;
        if (!rawText.trim()) return;
        currentData = rawText.split('\n').map(row => row.split('\t'));
        currentDynamicFilename = "Pasted_Data_Raw.xlsx";
        updateFilenameDisplay();
        processUIAfterDataLoad();
    }

    // === 2. UPDATE UI ===
    function processUIAfterDataLoad() {
        renderTable();
    }

    function updateFilenameDisplay() {
        const display = document.getElementById('exportFilenameDisplay');
        display.innerText = currentDynamicFilename;
        display.style.display = 'block';
    }

    function renderTable() {
        const thead = document.getElementById('tableHead');
        const tbody = document.getElementById('tableBody');
        thead.innerHTML = '';
        tbody.innerHTML = '';

        if (currentData.length === 0) return;

        const headers = currentData[0];
        headers.forEach((headerText, index) => {
            const th = document.createElement('th');
            th.innerText = headerText || `Col ${index + 1}`;
            thead.appendChild(th);
        });

        let validRowCount = 0;
        for (let i = 1; i < currentData.length; i++) {
            const row = currentData[i];
            if (row.length === 0 || (row.length === 1 && row[0] === "")) continue;
            const tr = document.createElement('tr');
            row.forEach((cellData, colIndex) => {
                const td = document.createElement('td');
                td.contentEditable = "true";
                td.innerText = cellData !== undefined ? cellData : "";
                td.addEventListener('blur', function() { currentData[i][colIndex] = this.innerText; });
                tr.appendChild(td);
            });
            tbody.appendChild(tr);
            validRowCount++;
        }
        document.getElementById('rowCount').innerText = `${validRowCount} baris`;
    }

    // === 3. EXPORT EXCEL ===
    function exportToExcel() {
        if (currentData.length === 0) return alert("Tidak ada data untuk diexport!");
        
        const worksheet = XLSX.utils.aoa_to_sheet(currentData);
        const workbook = XLSX.utils.book_new();
        
        XLSX.utils.book_append_sheet(workbook, worksheet, "Data Analisis");
        XLSX.writeFile(workbook, currentDynamicFilename);
    }

    // === 4. AI ANALYST ===
    async function processWithAI() {
        const userPrompt = document.getElementById('aiPrompt').value.trim();
        const errorDiv = document.getElementById('aiError');
        const summaryDiv = document.getElementById('aiSummary');

        errorDiv.style.display = 'none';
        summaryDiv.style.display = 'none';

        if (!GEMINI_API_KEY) return showError("API Key belum diatur.");
        if (currentData.length < 2) return showError("Load data mentah terlebih dahulu.");
        if (!userPrompt) return showError("Masukkan instruksi analisis.");

        const btn = document.getElementById('btnAI');
        const btnText = document.getElementById('aiBtnText');
        const loader = document.getElementById('aiLoader');
        const icon = document.getElementById('aiIcon');

        btn.disabled = true;
        loader.style.display = 'block';
        icon.style.display = 'none';
        btnText.innerText = "Proses...";

        try {
            const systemPrompt = `Kamu adalah Senior System Analyst. Manipulasi data berikut sesuai instruksi.
ATURAN STRICT: Jawab HANYA berupa raw JSON object dengan struktur:
{
  "filename": "nama_file_relevan.xlsx",
  "summary": "Penjelasan singkat perubahan data.",
  "data": [ ["Header1", "Header2"], ["Val1", "Val2"] ]
}
DILARANG menambahkan teks markdown, backtick, atau apapun selain raw JSON.

Instruksi: ${userPrompt}
Data: ${JSON.stringify(currentData)}`;

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: systemPrompt }] }] })
            });

            const result = await response.json();
            if (!response.ok) throw new Error(result.error?.message || "Kesalahan API.");

            let aiOutput = result.candidates[0].content.parts[0].text;
            aiOutput = aiOutput.replace(/```json/g, '').replace(/```/g, '').trim();
            const parsedData = JSON.parse(aiOutput);

            if (parsedData.data && Array.isArray(parsedData.data)) {
                currentData = parsedData.data;
                currentDynamicFilename = parsedData.filename?.endsWith('.xlsx') ? parsedData.filename : (parsedData.filename || 'hasil') + '.xlsx';

                updateFilenameDisplay();
                processUIAfterDataLoad();

                document.getElementById('aiSummaryText').innerText = parsedData.summary;
                summaryDiv.style.display = 'block';
            } else {
                throw new Error("Format output AI tidak valid.");
            }
        } catch (error) {
            showError(`Error: ${error.message}`);
            console.error(error);
        } finally {
            btn.disabled = false;
            loader.style.display = 'none';
            icon.style.display = 'block';
            btnText.innerText = "Eksekusi Data";
        }
    }

    function showError(msg) {
        const errorDiv = document.getElementById('aiError');
        errorDiv.innerText = msg;
        errorDiv.style.display = 'block';
    }
</script>
</body>
</html>
