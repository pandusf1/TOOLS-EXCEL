<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Analyst Data Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
    <style>
        .table-container { max-height: 55vh; overflow: auto; }
        table { border-collapse: collapse; width: 100%; font-size: 0.875rem; }
        th, td { border: 1px solid #d1d5db; padding: 0.5rem; text-align: left; white-space: nowrap; }
        th { background-color: #f3f4f6; position: sticky; top: 0; z-index: 10; font-weight: 600; }
        td:focus { outline: 2px solid #3b82f6; background-color: #eff6ff; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #6b21a8; border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-100 p-6 font-sans">

    <div class="max-w-7xl mx-auto bg-white rounded-xl shadow-xl p-6 border border-slate-200">
        
        <header class="mb-6 border-b pb-4 flex justify-between items-end">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">Pro Analyst Data Dashboard</h1>
                <p class="text-sm text-slate-500">Sistem transformasi data operasional dan akuntansi bertenaga AI.</p>
            </div>
            <div class="flex items-center gap-3">
                <span id="exportFilenameDisplay" class="text-xs font-mono text-slate-500 bg-slate-100 px-2 py-1 rounded border hidden"></span>
                <button onclick="exportToExcel()" class="bg-emerald-600 hover:bg-emerald-700 text-white shadow-sm py-2 px-6 rounded text-sm font-medium transition flex items-center gap-2">
                    💾 Download Excel
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
            <div class="bg-slate-50 p-4 rounded-lg border border-slate-200 lg:col-span-1">
                <h2 class="text-lg font-semibold mb-3 text-slate-700">1. Input Data</h2>
                <div class="mb-4">
                    <input type="file" id="excelFile" accept=".xlsx, .xls, .csv" class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer"/>
                </div>
                <div>
                    <textarea id="pasteArea" rows="3" class="w-full border rounded-md p-2 text-sm focus:ring-blue-500" placeholder="Atau paste data raw dari sistem (TSV/CSV)..."></textarea>
                    <button onclick="processPastedData()" class="mt-2 bg-slate-800 hover:bg-slate-900 text-white py-1.5 px-4 rounded text-sm transition w-full">Load Pasted Data</button>
                </div>
            </div>

            <div class="bg-fuchsia-50 p-4 rounded-lg border border-fuchsia-200 lg:col-span-2 shadow-inner">
                <h2 class="text-lg font-semibold mb-2 text-fuchsia-900 flex items-center gap-2">
                    🧠 AI System Analyst
                </h2>
                
                <div>
                    <label class="block text-xs font-bold text-fuchsia-700 uppercase mb-1">Instruksi Pemrosesan (Prompt)</label>
                    <div class="flex gap-2">
                        <textarea id="aiPrompt" rows="3" class="flex-1 border-fuchsia-300 rounded-md p-2 text-sm focus:ring-fuchsia-500" placeholder="Contoh: 'Filter data yang statusnya selesai, lalu buatkan rekapitulasi total biaya operasional per tanggal. Sesuaikan formatnya untuk jurnal akuntansi.'"></textarea>
                        <button onclick="processWithAI()" id="btnAI" class="bg-fuchsia-700 hover:bg-fuchsia-800 text-white py-2 px-4 rounded text-sm font-medium transition flex flex-col justify-center items-center w-36 shadow-md">
                            <span id="aiBtnText">Eksekusi Data</span>
                            <span id="aiLoader" class="loader hidden mt-1"></span>
                        </button>
                    </div>
                </div>
                
                <div id="aiSummary" class="mt-3 text-sm text-fuchsia-800 bg-fuchsia-100/50 p-3 rounded border border-fuchsia-200 hidden">
                    <span class="font-bold block mb-1">📝 Analyst Log:</span>
                    <span id="aiSummaryText"></span>
                </div>
                
                <div id="aiError" class="mt-2 text-xs text-red-600 font-bold bg-red-100 p-2 rounded hidden"></div>
            </div>
        </div>

        <div>
            <div class="flex justify-between items-center mb-2">
                <h2 class="text-lg font-semibold text-slate-700">Live Data View</h2>
                <span id="rowCount" class="text-xs font-bold text-slate-500 bg-slate-200 py-1 px-3 rounded-full">0 Baris</span>
            </div>
            <div class="table-container border border-slate-300 rounded-lg bg-white shadow-inner" id="tableContainer">
                <table id="dataTable">
                    <thead>
                        <tr id="tableHead"><th>No Data</th></tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td class="text-center text-slate-400 py-12">Load data mentah terlebih dahulu untuk memulai analisis.</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        const GEMINI_API_KEY = "AIzaSyAFoxz6sHokEjzLbGKGqw8iK7OsZzylgTs"; 
        
        let currentData = [];
        let currentDynamicFilename = "Data_Mentah_Export.xlsx"; // Default fallback

        // === FUNGSI LOAD DATA ===
        document.getElementById('excelFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                currentData = XLSX.utils.sheet_to_json(worksheet, {header: 1, defval: ""});
                
                // Gunakan nama file asli sebagai base jika belum diproses AI
                currentDynamicFilename = "Clean_" + file.name;
                updateFilenameDisplay();
                renderTable();
            };
            reader.readAsArrayBuffer(file);
        });

        function processPastedData() {
            const rawText = document.getElementById('pasteArea').value;
            if (!rawText.trim()) return;
            const rows = rawText.split('\n');
            currentData = rows.map(row => row.split('\t'));
            currentDynamicFilename = "Pasted_Data_Raw.xlsx";
            updateFilenameDisplay();
            renderTable();
        }

        // === FUNGSI RENDER TABEL & UI ===
        function updateFilenameDisplay() {
            const display = document.getElementById('exportFilenameDisplay');
            display.innerText = currentDynamicFilename;
            display.classList.remove('hidden');
        }

        function renderTable() {
            const thead = document.getElementById('tableHead');
            const tbody = document.getElementById('tableBody');
            thead.innerHTML = ''; tbody.innerHTML = '';

            if (currentData.length === 0) return;

            const headers = currentData[0];
            headers.forEach((headerText, index) => {
                const th = document.createElement('th');
                th.innerText = headerText || `Col ${index + 1}`;
                thead.appendChild(th);
            });

            let validRowCount = 0;
            for (let i = 1; i < currentData.length; i++) {
                if(currentData[i].length === 0 || (currentData[i].length === 1 && currentData[i][0] === "")) continue;
                
                const tr = document.createElement('tr');
                currentData[i].forEach((cellData, colIndex) => {
                    const td = document.createElement('td');
                    td.contentEditable = "true";
                    td.innerText = cellData !== undefined ? cellData : "";
                    td.addEventListener('blur', function() { currentData[i][colIndex] = this.innerText; });
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
                validRowCount++;
            }
            document.getElementById('rowCount').innerText = `${validRowCount} Baris`;
        }

        // === FUNGSI EXPORT ===
        function exportToExcel() {
            if(currentData.length === 0) return alert("Tidak ada data untuk diexport!");
            const worksheet = XLSX.utils.aoa_to_sheet(currentData);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Data Analisis");
            
            // Menggunakan nama file dinamis dari AI
            XLSX.writeFile(workbook, currentDynamicFilename);
        }

        // === INTEGRASI GEMINI AI (SUPERCHARGED) ===
        async function processWithAI() {
            const userPrompt = document.getElementById('aiPrompt').value.trim();
            const errorDiv = document.getElementById('aiError');
            const summaryDiv = document.getElementById('aiSummary');
            
            errorDiv.classList.add('hidden');
            summaryDiv.classList.add('hidden');

            if (GEMINI_API_KEY === "MASUKKAN_API_KEY_ANDA_DI_SINI" || !GEMINI_API_KEY) {
                errorDiv.innerText = "Error: API Key belum diatur. Edit script const GEMINI_API_KEY.";
                errorDiv.classList.remove('hidden');
                return;
            }
            if (currentData.length < 2) {
                errorDiv.innerText = "Error: Load data mentah terlebih dahulu.";
                errorDiv.classList.remove('hidden');
                return;
            }
            if (!userPrompt) {
                errorDiv.innerText = "Error: Masukkan instruksi analisis.";
                errorDiv.classList.remove('hidden');
                return;
            }

            // UI State Loading
            const btn = document.getElementById('btnAI');
            const btnText = document.getElementById('aiBtnText');
            const loader = document.getElementById('aiLoader');
            btn.disabled = true; btn.classList.add('opacity-75', 'cursor-not-allowed');
            btnText.innerText = "Menganalisis..."; loader.classList.remove('hidden');

            try {
                // SYSTEM PROMPT DIUPGRADE MENJADI SENIOR ANALYST
                const systemPrompt = `Kamu adalah Senior System Analyst dan Pakar Akuntansi. 
Tugasmu memanipulasi data operasional/keuangan sesuai instruksi user.

ATURAN STRICT HARUS BERUPA JSON OBJECT dengan struktur berikut:
{
  "filename": "nama_file_yang_sangat_relevan_dengan_konteks.xlsx",
  "summary": "Penjelasan singkat 1-2 kalimat tentang perubahan apa saja yang kamu lakukan pada data.",
  "data": [
    ["Header1", "Header2"],
    ["Val1", "Val2"]
  ]
}

- "filename" JANGAN menggunakan spasi (gunakan underscore).
- "data" harus konsisten strukturnya (Array of Arrays).
- DILARANG memberikan teks apapun di luar JSON. Dilarang menggunakan markdown \`\`\`json. HANYA OUTPUT RAW JSON OBJECT.

Instruksi User: ${userPrompt}

Data Mentah Input:
${JSON.stringify(currentData)}`;

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: systemPrompt }] }]
                    })
                });

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.error?.message || "Kesalahan koneksi ke AI API.");
                }

                let aiOutput = result.candidates[0].content.parts[0].text;
                
                // Pembersihan ekstra jika AI tetap mengirimkan format markdown code block
                aiOutput = aiOutput.replace(/```json/g, '').replace(/```/g, '').trim();

                const parsedData = JSON.parse(aiOutput);

                // Validasi struktur JSON baru
                if (parsedData.data && Array.isArray(parsedData.data) && parsedData.filename) {
                    
                    // 1. Update Data Tabel
                    currentData = parsedData.data; 
                    renderTable();

                    // 2. Update Nama File Dinamis
                    currentDynamicFilename = parsedData.filename;
                    if(!currentDynamicFilename.endsWith('.xlsx')){
                        currentDynamicFilename += '.xlsx';
                    }
                    updateFilenameDisplay();

                    // 3. Tampilkan Log/Summary dari AI
                    document.getElementById('aiSummaryText').innerText = parsedData.summary || "Data berhasil diproses tanpa catatan khusus.";
                    summaryDiv.classList.remove('hidden');

                } else {
                    throw new Error("Struktur JSON dari AI tidak sesuai dengan format {filename, summary, data}.");
                }

            } catch (error) {
                errorDiv.innerText = `Error Sistem: ${error.message}`;
                errorDiv.classList.remove('hidden');
                console.error(error); // Untuk debugging di console browser
            } finally {
                // Kembalikan UI State
                btn.disabled = false; btn.classList.remove('opacity-75', 'cursor-not-allowed');
                btnText.innerText = "Eksekusi Data"; loader.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
